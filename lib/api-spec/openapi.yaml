  /tracking/{token}:
    get:
      operationId: getTrackingData
      tags: [tracking]
      security: []
      summary: Public tracking page data for a kesim-alani
      description: |
        Returns the full snapshot of a kesim-alani for the public tracking page — no auth required.
        The `token` is a short-lived signed token issued by `generateTrackingToken`. Response
        includes area name, animal group list with donor info, team assignments, and
        aggregate counts. Donors (families) can use this page to watch slaughter progress live.
      parameters: [{ name: token, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  serverTime: { type: string, format: date-time, description: "Current server time" }
                  kesimAlaniName: { type: string }
                  projectName: { type: string, nullable: true }
                  totalGroups: { type: integer }
                  kesildiCount: { type: integer, description: "Number of groups marked as slaughtered" }
                  groups:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        animalNo: { type: integer, nullable: true }
                        colorTag: { type: string, nullable: true }
                        kesildi: { type: boolean }
                        kesildiAt: { type: string, format: date-time, nullable: true }
                        teamId: { type: string, nullable: true }
                        filledCount: { type: integer, description: "Number of donors in this group who have a name" }
                        donors:
                          type: array
                          items:
                            type: object
                            properties:
                              name: { type: string }
                              description: { type: string }
                              donationType: { type: string }
                              vekalet: { type: string }
                              notes: { type: string }
                      additionalProperties: true
                  teams:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        color: { type: string }
                additionalProperties: true
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
