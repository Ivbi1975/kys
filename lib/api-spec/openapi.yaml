components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SignedSessionToken
      description: |
        Signed session token issued by `/auth/login`. Format: `s1.<expSeconds>.<base64urlHmac>`.
        Sent as `Authorization: Bearer <token>`.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Legacy API key auth (server-to-server callers and tests). The raw API_KEY should never
        be exposed to the browser.
  responses:
    Success:
      description: Operation succeeded
      content: { application/json: { schema: { $ref: "#/components/schemas/SimpleSuccess" } } }
    Error:
      description: Error response
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
  schemas:
    JsonObject:
      type: object
      additionalProperties: true
    JsonArray:
      type: array
      items: { $ref: "#/components/schemas/JsonObject" }
    HealthStatus:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded] }
        db:
          type: object
          properties:
            connected: { type: boolean }
            latencyMs: { type: integer }
            pool:
              type: object
              properties:
                total: { type: integer }
                idle: { type: integer }
                active: { type: integer }
                waiting: { type: integer }
              required: [total, idle, active, waiting]
          required: [connected, latencyMs, pool]
        uptime: { type: integer }
      required: [status, db, uptime]
    LoginRequest:
      type: object
      properties:
        password: { type: string, minLength: 1 }
      required: [password]
    LoginResponse:
      type: object
      properties:
        success: { type: boolean }
        token: { type: string, description: "Signed session token (s1.<exp>.<sig>)" }
        expiresAt: { type: integer, description: "Unix epoch seconds when the token expires" }
      required: [token, expiresAt]
    PhotoToken:
      type: object
      properties:
        token: { type: string }
        expiresAt: { type: integer }
      required: [token, expiresAt]
    BackupImportRequest:
      type: object
      properties:
        mode: { type: string, enum: [replace, merge] }
        dryRun: { type: boolean, description: "If true, validate and report counts without writing" }
        confirmReplace: { type: boolean, description: "Required when mode=replace and dryRun=false" }
        data:
          $ref: "#/components/schemas/JsonObject"
      required: [data]
    SimpleSuccess:
      type: object
      properties:
        success: { type: boolean }
      required: [success]
    ErrorResponse:
      type: object
      properties:
        error: { type: string, description: "Human-readable error message (Turkish)" }
        detail: { type: string }
        details: { type: array, items: { type: object, additionalProperties: true } }
        issues: { type: array, items: { type: string } }
        hint: { type: object, additionalProperties: true }
      required: [error]
