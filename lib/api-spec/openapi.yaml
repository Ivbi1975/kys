  /kesim-alanlari/{id}/groups:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      operationId: listAnimalGroups
      tags: [animal-groups]
      summary: List animal groups (read / discovery)
      description: |
        Returns active animal groups for a kesim-alani with keyset pagination.

        **Path convention — `/groups` vs `/animal-groups`:**
        The `/groups` sub-path hosts **read, discovery, and in-place bulk status operations**
        (list, count, get, bulk-lock). The `/animal-groups` sub-path handles **structural
        write operations** that create, fully update, or delete group records (create, bulk-update,
        delete). `bulk-lock` lives under `/groups` because it only toggles a status flag in-place
        rather than creating or destroying records.

        Pass `compact=1` to receive `donationIds` arrays instead of counts for each group.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: cursor, in: query, schema: { type: string }, description: "Keyset pagination cursor from previous response's nextCursor" }
        - { name: offset, in: query, schema: { type: integer }, description: "Offset-based pagination (used when no cursor is provided)" }
        - { name: compact, in: query, schema: { type: string, enum: ["1"] }, description: "If '1', return donationIds array per group instead of donationCount" }
        - { name: locked, in: query, schema: { type: boolean }, description: "Filter by locked status" }
        - { name: kesildi, in: query, schema: { type: boolean }, description: "Filter by slaughter status" }
        - { name: teamId, in: query, schema: { type: string }, description: "Filter by team assignment" }
        - { name: sortField, in: query, schema: { type: string, enum: [sortOrder, animalNo] } }
        - { name: sortDir, in: query, schema: { type: string, enum: [asc, desc] } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        animalNo: { type: integer }
                        colorTag: { type: string, nullable: true }
                        locked: { type: boolean }
                        notes: { type: string, nullable: true }
                        kesildi: { type: boolean }
                        kesildiAt: { type: string, format: date-time, nullable: true }
                        teamId: { type: string, nullable: true }
                        sortOrder: { type: integer }
                        updatedAt: { type: string, format: date-time, nullable: true }
                        donationCount: { type: integer }
                        photoCount: { type: integer }
                      additionalProperties: true
                  nextCursor: { type: string, nullable: true, description: "Opaque keyset cursor for the next page; null if no more pages" }
                  hasMore: { type: boolean }
                required: [items, nextCursor, hasMore]
