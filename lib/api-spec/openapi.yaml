      description: |
        Upload a photo via multipart/form-data with a single `file` field. The exact body
        schema is intentionally omitted from this spec because the generated zod/typescript
        client does not model `File`/`Blob` portably; callers should construct a FormData
        body manually.
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /tracking/{token}/group/{groupId}/photos/{photoId}:
    parameters:
      - { name: token, in: path, required: true, schema: { type: string } }
      - { name: groupId, in: path, required: true, schema: { type: string } }
      - { name: photoId, in: path, required: true, schema: { type: string } }
    get:
      operationId: getTrackingGroupPhoto
      tags: [tracking, photos]
      security: []
      responses:
        "200": { description: Image bytes, content: { "image/*": { schema: { type: string, format: binary } } } }
    delete:
      operationId: deleteTrackingGroupPhoto
      tags: [tracking, photos]
      security: []
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /ai-notes/settings:
    get:
      operationId: getAiNotesSettings
      tags: [ai-notes]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
    put:
      operationId: updateAiNotesSettings
      tags: [ai-notes]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /ai-notes/classify:
    post:
      operationId: classifyNotes
      tags: [ai-notes]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /ai-notes/classify-async:
    post:
      operationId: classifyNotesAsync
      tags: [ai-notes]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /ai-notes/jobs/{jobId}:
    get:
      operationId: getAiClassifyJob
      tags: [ai-notes]
      parameters: [{ name: jobId, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /ai-notes/jobs/{jobId}/cancel:
    post:
      operationId: cancelAiClassifyJob
      tags: [ai-notes]
      parameters: [{ name: jobId, in: path, required: true, schema: { type: string } }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /ai-notes/active-job:
    get:
      operationId: getActiveAiJob
      tags: [ai-notes]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /ai-notes/save-classifications:
    put:
      operationId: saveAiClassifications
      tags: [ai-notes]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /ai-notes/bulk-update:
    put:
      operationId: bulkUpdateAiNotes
      tags: [ai-notes]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }

  # ─── VYS (Vekalet Yönetim Sistemi) endpoints ─────────────────────────────
  /vys/projects:
    get:
      operationId: vysListProjects
      tags: [vys]
      summary: List active projects (VYS)
      security: [{ apiKeyAuth: [] }]
      description: Returns all active (non-deleted, non-archived) projects with share counts.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    name: { type: string }
                    createdAt: { type: string, format: date-time }
                    totalShareCount: { type: integer }
                  required: [id, name, createdAt, totalShareCount]
        "401": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /vys/projects/{id}/donations:
    get:
      operationId: vysListDonations
      tags: [vys]
      summary: Paginated donor/share list for a project (VYS)
      security: [{ apiKeyAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 100, maximum: 500 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        description: { type: string, nullable: true }
                        shareCount: { type: integer }
                        vekalet: { type: string, nullable: true }
                        tags:
                          type: array
                          items:
                            type: object
                            properties:
                              id: { type: string }
                              name: { type: string }
                            required: [id, name]
                      required: [id, name, shareCount, tags]
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }
                  totalPages: { type: integer }
                required: [items, total, page, limit, totalPages]
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /vys/projects/{id}/kesim-alanlari:
    get:
      operationId: vysListKesimAlanlari
      tags: [vys]
      summary: List active slaughter areas for a project (VYS)
      security: [{ apiKeyAuth: [] }]
      description: |
        Returns active kesim alanlari (excluding the internal `__havuz__` area).
        For the full nested view with animal groups included, prefer
        `GET /vys/projects/{id}/kesim-listesi`.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    name: { type: string }
                    capacity: { type: integer, nullable: true }
                    activeGroupCount: { type: integer }
                  required: [id, name, capacity, activeGroupCount]
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /vys/projects/{id}/kesim-listesi:
    get:
      operationId: vysGetKesimListesi
      tags: [vys]
      summary: All slaughter areas with nested animal groups in a single call (VYS)
      security: [{ apiKeyAuth: [] }]
      description: |
        Returns all active kesim alanlari and each area's animal groups in a single HTTP request.
        This eliminates the N+1 pattern of fetching `/kesim-alanlari` first and then calling
        `/kesim-alanlari/:kesimId/groups` for each area separately.

        `__havuz__` (internal pool area) is excluded. Areas with no groups return an empty
        `groups` array. This is the **preferred endpoint** for VYS to display the full cutting list.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VysKesimListesiResponse"
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /vys/projects/{id}/kesim-alanlari/{kesimId}/groups:
    get:
      operationId: vysGetKesimAlaniGroups
      tags: [vys]
      deprecated: true
      summary: Animal groups for a single slaughter area (VYS) — deprecated
      security: [{ apiKeyAuth: [] }]
      description: |
        **Deprecated.** Use `GET /vys/projects/{id}/kesim-listesi` instead. That endpoint returns
        all slaughter areas and their groups in a single call, avoiding N+1 HTTP requests.

        Returns animal groups for a single kesim-alani together with the area's name.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: kesimId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  kesimAlaniId: { type: string }
                  kesimAlaniName: { type: string }
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/VysAnimalGroup" }
                required: [kesimAlaniId, kesimAlaniName, items]
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /vys/projects/{id}/summary:
    get:
      operationId: vysGetSummary
      tags: [vys]
      summary: Project summary statistics (VYS)
      security: [{ apiKeyAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  projectName: { type: string }
                  totalShares: { type: integer }
                  assignedShares: { type: integer }
                  unassignedShares: { type: integer }
                  totalGroups: { type: integer }
                  kesildiGroups: { type: integer }
                  remainingGroups: { type: integer }
                required: [projectId, projectName, totalShares, assignedShares, unassignedShares, totalGroups, kesildiGroups, remainingGroups]
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: SignedSessionToken
      description: |
        Signed session token issued by `/auth/login`. Format: `s1.<expSeconds>.<base64urlHmac>`.
        Sent as `Authorization: Bearer <token>`.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Legacy API key auth (server-to-server callers and tests). The raw API_KEY should never
        be exposed to the browser.
  responses:
    Success:
      description: Operation succeeded
      content: { application/json: { schema: { $ref: "#/components/schemas/SimpleSuccess" } } }
    Error:
      description: Error response
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
  schemas:
    JsonObject:
      type: object
      additionalProperties: true
    JsonArray:
      type: array
      items: { $ref: "#/components/schemas/JsonObject" }
    VysAnimalGroup:
      type: object
      description: A single animal group as returned by VYS endpoints.
      properties:
        id: { type: string, description: "Group ID" }
        animalNo: { type: integer, description: "Animal number within the area" }
        colorTag: { type: string, nullable: true, description: "Color label (e.g. kırmızı, mavi)" }
        kesildi: { type: boolean, description: "Whether the animal has been slaughtered" }
        kesildiAt: { type: string, format: date-time, nullable: true, description: "Slaughter timestamp; null if not yet slaughtered" }
        sortOrder: { type: integer, description: "Display sort order" }
        assignedShares: { type: integer, description: "Total donation shares assigned to this group" }
      required: [id, animalNo, kesildi, sortOrder, assignedShares]
    VysKesimAlaniWithGroups:
      type: object
      description: A slaughter area with its animal groups nested inline.
      properties:
        id: { type: string }
        name: { type: string }
        capacity: { type: integer, nullable: true, description: "Max animal capacity; null if unlimited" }
        groups:
          type: array
          description: Active animal groups within this area (empty array if none)
          items: { $ref: "#/components/schemas/VysAnimalGroup" }
      required: [id, name, capacity, groups]
    VysKesimListesiResponse:
      type: array
      description: |
        Response for `GET /vys/projects/{id}/kesim-listesi`. Each element is a slaughter area
        with its animal groups nested. The internal `__havuz__` area is excluded.
      items: { $ref: "#/components/schemas/VysKesimAlaniWithGroups" }
    HealthStatus:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded] }
        db:
          type: object
          properties:
            connected: { type: boolean }
            latencyMs: { type: integer }
            pool:
              type: object
              properties:
                total: { type: integer }
                idle: { type: integer }
                active: { type: integer }
                waiting: { type: integer }
              required: [total, idle, active, waiting]
          required: [connected, latencyMs, pool]
        uptime: { type: integer }
      required: [status, db, uptime]
    LoginRequest:
      type: object
      properties:
        password: { type: string, minLength: 1 }
      required: [password]
    LoginResponse:
      type: object
      properties:
        success: { type: boolean }
        token: { type: string, description: "Signed session token (s1.<exp>.<sig>)" }
        expiresAt: { type: integer, description: "Unix epoch seconds when the token expires" }
      required: [token, expiresAt]
    PhotoToken:
      type: object
      properties:
        token: { type: string }
        expiresAt: { type: integer }
      required: [token, expiresAt]
    BackupImportRequest:
      type: object
      properties:
        mode: { type: string, enum: [replace, merge] }
        dryRun: { type: boolean, description: "If true, validate and report counts without writing" }
        confirmReplace: { type: boolean, description: "Required when mode=replace and dryRun=false" }
        data:
          $ref: "#/components/schemas/JsonObject"
      required: [data]
    SimpleSuccess:
      type: object
      properties:
        success: { type: boolean }
      required: [success]
    ErrorResponse:
      type: object
      properties:
        error: { type: string, description: "Human-readable error message (Turkish)" }
        detail: { type: string }
        details: { type: array, items: { type: object, additionalProperties: true } }
        issues: { type: array, items: { type: string } }
        hint: { type: object, additionalProperties: true }
      required: [error]
