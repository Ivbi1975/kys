openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status including DB connectivity and pool stats
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Degraded — DB unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        db:
          type: object
          properties:
            connected:
              type: boolean
            latencyMs:
              type: integer
            pool:
              type: object
              properties:
                total:
                  type: integer
                idle:
                  type: integer
                active:
                  type: integer
                waiting:
                  type: integer
              required: [total, idle, active, waiting]
          required: [connected, latencyMs, pool]
        uptime:
          type: integer
      required:
        - status
        - db
        - uptime
