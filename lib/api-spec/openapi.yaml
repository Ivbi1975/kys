  /projects/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      operationId: getProject
      tags: [projects]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
    put:
      operationId: updateProject
