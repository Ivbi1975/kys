openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: |
    API specification for the Kurban Hisse Kağıdı (Sacrificial Donation Management) backend.

    All endpoints (except `/healthz` and `/auth/login`) require authentication via either:
    - `Authorization: Bearer <signed-session-token>` (preferred for browser clients)
    - `X-API-Key: <key>` (legacy, for server-to-server callers and tests)

    Many request/response bodies use loose JSON schemas (`type: object, additionalProperties: true`)
    because the application code carries the canonical Zod validators in
    `artifacts/api-server/src/routes/*`. Tightening these schemas (and deriving them from the
    server-side Zod definitions) is tracked as ongoing work.
servers:
  - url: /api
    description: Base API path
security:
  - bearerAuth: []
  - apiKeyAuth: []
tags:
  - name: health
  - name: auth
  - name: projects
  - name: kesim-alanlari
  - name: donations
  - name: animal-groups
  - name: tags
  - name: settings
  - name: backup
  - name: export
  - name: tracking
  - name: ai-notes
  - name: audit-logs
  - name: home-data
  - name: integrity
  - name: photos
  - name: vys
    description: |
      Read-only endpoints consumed by the VYS (Vekalet Yönetim Sistemi) integration.
      All routes are under `/api/vys/` and require `X-API-Key: <VYS_API_KEY>` authentication
      (a separate key from the main `API_KEY`/`ADMIN_KEY`).
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      security: []
      summary: Health check
      responses:
        "200": { description: Healthy, content: { application/json: { schema: { $ref: "#/components/schemas/HealthStatus" } } } }
        "503": { description: Degraded, content: { application/json: { schema: { $ref: "#/components/schemas/HealthStatus" } } } }
  /cache-stats:
    get:
      operationId: cacheStats
      tags: [health]
      summary: In-process cache stats
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      security: []
      summary: Authenticate with the application password
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/LoginRequest" } } }
      responses:
        "200": { description: Login successful, content: { application/json: { schema: { $ref: "#/components/schemas/LoginResponse" } } } }
        "401": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }
  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Stateless logout acknowledgement
      responses:
        "200": { $ref: "#/components/responses/Success" }
  /photo-token:
    get:
      operationId: getPhotoToken
      tags: [auth]
      summary: Issue a short-lived signed token for photo URLs
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PhotoToken" } } } }
        "503": { $ref: "#/components/responses/Error" }
  /home-data:
    get:
      operationId: getHomeData
      tags: [home-data]
      summary: Aggregated data for the home page
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit-logs]
      parameters:
        - { name: limit, in: query, schema: { type: integer } }
        - { name: offset, in: query, schema: { type: integer } }
        - { name: entityType, in: query, schema: { type: string } }
        - { name: action, in: query, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
  /integrity/check:
    get:
      operationId: integrityCheck
      tags: [integrity]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
  /integrity/repair:
    post:
      operationId: integrityRepair
      tags: [integrity]
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
  /global-search:
    get:
      operationId: globalSearch
      tags: [home-data]
      parameters:
        - { name: q, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonArray" } } } } }
    post:
      operationId: createProject
      tags: [projects]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/deleted:
    get:
      operationId: listDeletedProjects
      tags: [projects]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonArray" } } } } }
  /projects/archived:
    get:
      operationId: listArchivedProjects
      tags: [projects]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonArray" } } } } }
  /projects/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      operationId: getProject
      tags: [projects]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
    put:
      operationId: updateProject
      tags: [projects]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
    delete:
      operationId: deleteProject
      tags: [projects]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /projects/{id}/restore:
    post:
      operationId: restoreProject
      tags: [projects]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /projects/{id}/archive:
    post:
      operationId: archiveProject
      tags: [projects]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /projects/{id}/unarchive:
    post:
      operationId: unarchiveProject
      tags: [projects]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /projects/{id}/dashboard:
    get:
      operationId: getProjectDashboard
      tags: [projects]
      summary: Project slaughter progress dashboard
      description: |
        Returns a per-project slaughter progress snapshot: overall animal counts and per-area
        breakdowns. Cached with a short TTL. Used by the main dashboard UI to display live
        slaughter progress without loading the full kesim-alanlari detail.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  projectId: { type: string }
                  projectName: { type: string }
                  totalAnimals: { type: integer, description: "Total animal groups across all kesim alanlari" }
                  kesildiCount: { type: integer, description: "Animals slaughtered so far" }
                  remainingCount: { type: integer, description: "Animals yet to be slaughtered" }
                  kesildiPercent: { type: integer, description: "Overall progress percentage (0–100)" }
                  lastKesildiAt: { type: string, format: date-time, nullable: true, description: "Timestamp of most recent slaughter across all areas" }
                  kesimAlanlari:
                    type: array
                    description: Per-area breakdown
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        totalAnimals: { type: integer }
                        kesildiCount: { type: integer }
                        kesildiPercent: { type: integer }
                        lastKesildiAt: { type: string, format: date-time, nullable: true }
                      additionalProperties: true
                additionalProperties: true
        "404": { $ref: "#/components/responses/Error" }
  /projects/{id}/donations:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      operationId: listPoolDonations
      tags: [donations]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
    delete:
      operationId: deleteAllPoolDonations
      tags: [donations]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /projects/{id}/donations/stats:
    get:
      operationId: getPoolDonationStats
      tags: [donations]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/{id}/donations/bulk-import:
    post:
      operationId: bulkImportDonations
      tags: [donations]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/{id}/donations/siblings:
    post:
      operationId: getDonationSiblings
      tags: [donations]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/{id}/donations/transfer:
    post:
      operationId: transferDonations
      tags: [donations]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/{id}/donations/bulk-action:
    post:
      operationId: bulkActionDonations
      tags: [donations]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/{id}/donations/bulk-delete-preview:
    post:
      operationId: bulkDeletePreview
      tags: [donations]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/{id}/donations/bulk-delete:
    post:
      operationId: bulkDeleteDonations
      tags: [donations]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/{id}/donations/assigned-vekalets:
    get:
      operationId: getAssignedVekalets
      tags: [donations]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonArray" } } } } }
  /projects/{id}/donations/vekalet-check:
    post:
      operationId: vekaletCheck
      tags: [donations]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/{id}/donations/bulk-tag:
    post:
      operationId: bulkTagDonations
      tags: [donations]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/{id}/donations/bulk-notes:
    post:
      operationId: bulkNoteDonations
      tags: [donations]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/{projectId}/donations/{id}:
    patch:
      operationId: updatePoolDonation
      tags: [donations]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: string } }
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/{projectId}/donations/{id}/flag:
    post:
      operationId: flagDonation
      tags: [donations]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: string } }
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /projects/{projectId}/donations/{id}/unflag:
    post:
      operationId: unflagDonation
      tags: [donations]
      parameters:
        - { name: projectId, in: path, required: true, schema: { type: string } }
        - { name: id, in: path, required: true, schema: { type: string } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /projects/{id}/flagged-donations:
    get:
      operationId: listFlaggedDonations
      tags: [donations]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonArray" } } } } }
  /projects/{id}/automation-rules:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      operationId: listAutomationRules
      tags: [donations]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonArray" } } } } }
    post:
      operationId: createAutomationRule
      tags: [donations]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/{id}/automation-rules/{ruleId}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
      - { name: ruleId, in: path, required: true, schema: { type: string } }
    put:
      operationId: updateAutomationRule
      tags: [donations]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
    delete:
      operationId: deleteAutomationRule
      tags: [donations]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /projects/{id}/automation-rules/execute:
    post:
      operationId: executeAutomationRules
      tags: [donations]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /projects/{projectId}/transfer-log:
    get:
      operationId: getTransferLog
      tags: [donations]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonArray" } } } } }
  /projects/{projectId}/pending-edit-requests:
    get:
      operationId: getPendingEditRequests
      tags: [donations]
      parameters: [{ name: projectId, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonArray" } } } } }
  /donation-transfers:
    post:
      operationId: createDonationTransfer
      tags: [donations]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /catisma-tespiti:
    get:
      operationId: detectConflicts
      tags: [donations]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /catisma-tespiti/transfer:
    post:
      operationId: resolveConflictTransfer
      tags: [donations]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /kesim-alanlari:
    get:
      operationId: listKesimAlanlari
      tags: [kesim-alanlari]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonArray" } } } } }
    post:
      operationId: createKesimAlani
      tags: [kesim-alanlari]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /kesim-alanlari/bulk:
    post:
      operationId: bulkCreateKesimAlanlari
      tags: [kesim-alanlari]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /kesim-alanlari/deleted:
    get:
      operationId: listDeletedKesimAlanlari
      tags: [kesim-alanlari]
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonArray" } } } } }
  /kesim-alanlari/move-donations:
    post:
      operationId: moveDonationsBetweenKesimAlanlari
      tags: [kesim-alanlari]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /kesim-alanlari/move-animal-group:
    post:
      operationId: moveAnimalGroupBetweenKesimAlanlari
      tags: [kesim-alanlari]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
  /kesim-alanlari/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      operationId: getKesimAlani
      tags: [kesim-alanlari]
      summary: Full kesim-alani detail with nested donations and groups
      description: |
        Returns the complete state of a kesim-alani: metadata (name, projectId, tracking token),
        all active animal groups with their assigned donations, and team assignments.
        Pass `?compact=1` to receive `donationIds` arrays instead of full donation objects within
        each group — useful when the client already has donation data cached.

        **Use this endpoint when you need the full nested structure for editing or display.**
        For lightweight aggregate counts only, prefer `GET /kesim-alanlari/{id}/meta`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  name: { type: string }
                  projectId: { type: string }
                  maxAnimal: { type: integer, nullable: true, description: "Capacity (null if unlimited)" }
                  donations: { type: array, items: { $ref: "#/components/schemas/JsonObject" }, description: "All donations in the area" }
                  animalGroups: { type: array, items: { $ref: "#/components/schemas/JsonObject" }, description: "Active groups with nested donation data" }
                  teams: { type: array, items: { $ref: "#/components/schemas/JsonObject" } }
                additionalProperties: true
        "404": { $ref: "#/components/responses/Error" }
    put:
      operationId: updateKesimAlani
      tags: [kesim-alanlari]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } } }
    delete:
      operationId: deleteKesimAlani
      tags: [kesim-alanlari]
      responses: { "200": { $ref: "#/components/responses/Success" } }
  /kesim-alanlari/{id}/meta:
    get:
      operationId: getKesimAlaniMeta
      tags: [kesim-alanlari]
      summary: Lightweight kesim-alani metadata and aggregate counts
      description: |
        Returns a lightweight derived summary of a kesim-alani: area details (name, projectId,
        split status), team list, and **aggregate counts** (`donationCount`, `groupCount`) instead
        of the full donation and group records. Unlike `GET /kesim-alanlari/{id}`, it does not
        include the nested donations or animalGroups arrays but adds derived count fields not
        present in the full payload.

        **Use this endpoint for polling or quick status checks** where loading the full nested
        structure would be wasteful. Use `GET /kesim-alanlari/{id}` when you need the actual
        donation or group records.
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  name: { type: string }
                  projectId: { type: string }
                  donationCount: { type: integer, description: "Total active donations in this area" }
                  groupCount: { type: integer, description: "Total active animal groups in this area" }
                  teams: { type: array, items: { $ref: "#/components/schemas/JsonObject" } }
                additionalProperties: true
        "404": { $ref: "#/components/responses/Error" }
  /kesim-alanlari/{id}/move:
    put:
      operationId: moveKesimAlani
      tags: [kesim-alanlari]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/JsonObject" } } } }
      responses: { "200": { $ref: "#/components/responses/Success" } }
